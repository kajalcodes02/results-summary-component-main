<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>result-summary-coomponent-main</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="main-container">
    <section class="container-1">
      <div>
        <h2 style="color: #ceb4f2;">Your Result</h2>
      </div>
      <div class="total"><span id="your-marks">76</span><br><span>of 100</span></div>
      <div>
        <h1>Great</h1>
      </div>
      <div class="description">you scored higher than 65% of the people who have taken these tests.</div>
    </section>
    <section class="container-2">
      <div>
        <h1>Summary</h1>
      </div>
      <div class="summaries">
        <div class="summary">
         <span id="summary-marks"> <img src="/results-summary-component-main/assets/images/icon-reaction.svg" alt="reaction">
          Reaction</span>
          <span> 80/100</span>
        </div>
        <div class="summary">  <span  id="summary-marks"><img src="/results-summary-component-main/assets/images/icon-memory.svg" alt=memory>
          Memory</span>
          <span> 92/100</span>
        </div></span>
        <div class="summary"> <span  id="summary-marks"><img src="/results-summary-component-main/assets/images/icon-verbal.svg"
            alt="verbal">Verbal</span>
          <span> 61/100</span>
        </div>
        <div class="summary"> <span  id="summary-marks"><img src="/results-summary-component-main/assets/images/icon-visual.svg" alt="visual">
          Visual</span>
          <span>73/100</span>
        </div>
      </div>
      <div>
        <button class="button">Continue</button>
      </div>
    </section>
  </div>
</body>

</html>
